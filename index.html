<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chytaj Jablká - Oto & Lujza</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <a href=".." style="position:absolute; top:1rem; left:1.5rem; color:#888; text-decoration:none; font-size:0.7rem; font-family:'Press Start 2P',monospace;" onmouseover="this.style.color='#e94560'" onmouseout="this.style.color='#888'">&larr; hry</a>
    <h1>Chytaj Jablká</h1>
    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
        <p class="subtitle" style="margin:0">hra s Otom a Lujzou</p>
        <button class="leaderboard-btn" onclick="showLeaderboard()" style="margin:0; font-size:0.55rem; padding:0.4rem 0.8rem;">🏆 Rebríček</button>
    </div>

    <div id="char-select">
        <h2>Vyber si postavu</h2>
        <div class="char-options">
            <div class="char-option" onclick="selectCharacter('oto')">
                <canvas id="oto-preview"></canvas>
                <div class="name">Oto</div>
                <div class="subtitle">ježko</div>
            </div>
            <div class="char-option" onclick="selectCharacter('lujza')">
                <canvas id="lujza-preview"></canvas>
                <div class="name">Lujza</div>
                <div class="subtitle">veverička</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si ovocie</h2>
        <div class="fruit-options">
            <div class="fruit-option" onclick="selectFruit('apple', this)">
                <canvas id="apple-preview"></canvas>
                <div class="subtitle">jablká</div>
            </div>
            <div class="fruit-option" onclick="selectFruit('pear', this)">
                <canvas id="pear-preview"></canvas>
                <div class="subtitle">hrušky</div>
            </div>
            <div class="fruit-option" onclick="selectFruit('orange', this)">
                <canvas id="orange-preview"></canvas>
                <div class="subtitle">pomaranče</div>
            </div>
            <div class="fruit-option" onclick="selectFruit('banana', this)">
                <canvas id="banana-preview"></canvas>
                <div class="subtitle">banány</div>
            </div>
            <div class="fruit-option" onclick="selectFruit('grapes', this)">
                <canvas id="grapes-preview"></canvas>
                <div class="subtitle">hrozno</div>
            </div>
            <div class="fruit-option active" onclick="selectFruit('all', this)">
                <canvas id="all-preview"></canvas>
                <div class="subtitle">všetko</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si pozadie</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBg('meadow', this)">
                <canvas id="bg-meadow-preview"></canvas>
                <div class="subtitle">lúka</div>
            </div>
            <div class="fruit-option" onclick="selectBg('sunset', this)">
                <canvas id="bg-sunset-preview"></canvas>
                <div class="subtitle">západ</div>
            </div>
            <div class="fruit-option" onclick="selectBg('night', this)">
                <canvas id="bg-night-preview"></canvas>
                <div class="subtitle">noc</div>
            </div>
            <div class="fruit-option" onclick="selectBg('snow', this)">
                <canvas id="bg-snow-preview"></canvas>
                <div class="subtitle">sneh</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si košík</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBasket('woven', this)">
                <canvas id="basket-woven-preview"></canvas>
                <div class="subtitle">prútený</div>
            </div>
            <div class="fruit-option" onclick="selectBasket('bucket', this)">
                <canvas id="basket-bucket-preview"></canvas>
                <div class="subtitle">vrecko</div>
            </div>
            <div class="fruit-option" onclick="selectBasket('pot', this)">
                <canvas id="basket-pot-preview"></canvas>
                <div class="subtitle">hrniec</div>
            </div>
        </div>

    </div>

    <div id="game-screen">
        <div id="hud">
            <div>Najlepšie: <span id="high-score">0</span></div>
            <div id="lives">❤❤❤</div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="mobile-controls">
            <button id="btn-left">&#9664;</button>
            <button id="btn-right">&#9654;</button>
        </div>

        <div id="game-over">
            <h2>Koniec hry!</h2>
            <div class="score">Skóre: <span id="final-score">0</span></div>
            <div id="name-input-area">
                <input type="text" id="player-name" placeholder="Tvoje meno" maxlength="20"
                    autocomplete="off" spellcheck="false">
                <button onclick="submitScore()">Uložiť skóre</button>
            </div>
            <div id="score-saved" style="display:none">
                <p class="saved-msg">Uložené!</p>
            </div>
            <button onclick="restartGame()">Hrať znova</button>
            <button onclick="backToSelect()">Zmeniť postavu</button>
        </div>
    </div>

    <div id="leaderboard" style="display:none">
        <h2>Rebríček</h2>
        <div class="lb-tabs">
            <button class="lb-tab active" onclick="switchTab('weekly', this)">Týždeň</button>
            <button class="lb-tab" onclick="switchTab('total', this)">Celkovo</button>
        </div>
        <div id="lb-list"></div>
        <button onclick="hideLeaderboard()">Späť</button>
    </div>

    <script src="static/js/sprites.js"></script>
    <script src="static/js/sounds.js"></script>
    <script src="static/js/game.js"></script>
</body>
</html>
