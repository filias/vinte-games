<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múr - Oto & Lujza</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <a href="/" style="position:absolute; top:1rem; left:1.5rem; color:#888; text-decoration:none; font-size:0.7rem; font-family:'Press Start 2P',monospace;" onmouseover="this.style.color='#e94560'" onmouseout="this.style.color='#888'">&larr; hry</a>
    <h1>Múr</h1>
    <p class="subtitle">rozbi všetky tehly</p>

    <div id="char-select">
        <h2>Vyber si postavu</h2>
        <div class="char-options">
            <div class="char-option" onclick="selectCharacter('oto')">
                <canvas id="oto-preview"></canvas>
                <div class="name">Oto</div>
                <div class="subtitle">ježko</div>
            </div>
            <div class="char-option" onclick="selectCharacter('lujza')">
                <canvas id="lujza-preview"></canvas>
                <div class="name">Lujza</div>
                <div class="subtitle">veverička</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si loptu</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBallColor('white', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#fff;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('red', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#e94560;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('yellow', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#f4d03f;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('cyan', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#0ff;margin:8px auto;"></div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si pozadie</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBg('meadow', this)">
                <canvas id="bg-meadow-preview"></canvas>
                <div class="subtitle">lúka</div>
            </div>
            <div class="fruit-option" onclick="selectBg('sunset', this)">
                <canvas id="bg-sunset-preview"></canvas>
                <div class="subtitle">západ</div>
            </div>
            <div class="fruit-option" onclick="selectBg('night', this)">
                <canvas id="bg-night-preview"></canvas>
                <div class="subtitle">noc</div>
            </div>
            <div class="fruit-option" onclick="selectBg('snow', this)">
                <canvas id="bg-snow-preview"></canvas>
                <div class="subtitle">sneh</div>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display:none; position:relative;">
        <div id="hud">
            <div>Skóre: <span id="score">0</span></div>
            <div id="lives">❤❤❤</div>
        </div>
        <canvas id="game"></canvas>
        <div id="mobile-controls">
            <button id="btn-left">&#9664;</button>
            <button id="btn-right">&#9654;</button>
        </div>
        <div id="game-over">
            <h2 id="end-title">Koniec hry!</h2>
            <div class="score">Skóre: <span id="final-score">0</span></div>
            <button onclick="startGame()">Hrať znova</button>
            <button onclick="backToSelect()">Zmeniť postavu</button>
        </div>
    </div>

    <script src="static/js/sprites.js"></script>
    <script src="static/js/sounds.js"></script>
    <script>
    const W = 480, H = 640;
    const PADDLE_W = 80, PADDLE_H = 14;
    const CHAR_SIZE = 40;
    const GROUND_H = 30;
    const PADDLE_Y = H - GROUND_H - CHAR_SIZE - PADDLE_H + 6;
    const BALL_R = 6;
    const BRICK_ROWS = 6, BRICK_COLS = 10;
    const BRICK_W = W / BRICK_COLS - 2, BRICK_H = 18;
    const BRICK_PAD = 2, BRICK_TOP = 40;
    const ROW_COLORS = ['#e94560', '#f39c12', '#f4d03f', '#2ecc71', '#3498db', '#9b59b6'];
    const BALL_SPEED = 4;

    const BG_THEMES = {
        meadow: { sky: '#87CEEB', skyTop: '#B0E0FF', ground: '#2ecc71', groundLine: '#27ae60', tufts: '#1e8449', clouds: true },
        sunset: { sky: '#e67e22', skyTop: '#f39c12', ground: '#5a3e2b', groundLine: '#4a2e1b', tufts: '#3a2010', clouds: true },
        night: { sky: '#1a1a3e', skyTop: '#0d0d2b', ground: '#1a3a1a', groundLine: '#0f2a0f', tufts: '#0a200a', stars: true },
        snow: { sky: '#c8d8e8', skyTop: '#dce8f0', ground: '#f0f0f5', groundLine: '#dde0e8', tufts: '#c8ccd5', clouds: true },
    };
    const BALL_COLORS_MAP = { white: '#fff', red: '#e94560', yellow: '#f4d03f', cyan: '#0ff' };

    let canvas, ctx;
    let character = null;
    let ballColorChoice = 'white';
    let bgMode = 'meadow';
    let paddleX, ballX, ballY, ballDX, ballDY;
    let bricks, score, lives, running, animFrame;
    let keys = {};

    function init() {
        canvas = document.getElementById('game');
        ctx = canvas.getContext('2d');
        canvas.width = W;
        canvas.height = H;

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'Escape' && running) endGame(false);
        });
        document.addEventListener('keyup', e => keys[e.key] = false);

        const leftBtn = document.getElementById('btn-left');
        const rightBtn = document.getElementById('btn-right');
        leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
        leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
        leftBtn.addEventListener('touchcancel', () => keys['ArrowLeft'] = false);
        rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
        rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
        rightBtn.addEventListener('touchcancel', () => keys['ArrowRight'] = false);
        document.addEventListener('touchend', () => {
            if (!leftBtn.matches(':active')) keys['ArrowLeft'] = false;
            if (!rightBtn.matches(':active')) keys['ArrowRight'] = false;
        });

        setupPreviews();
    }

    function setupPreviews() {
        const otoC = document.getElementById('oto-preview');
        otoC.width = 64; otoC.height = 64;
        drawOto(otoC.getContext('2d'), 8, 8, 48);

        const lujzaC = document.getElementById('lujza-preview');
        lujzaC.width = 64; lujzaC.height = 64;
        drawLujza(lujzaC.getContext('2d'), 8, 8, 48);

        for (const [id, theme] of Object.entries(BG_THEMES)) {
            const c = document.getElementById('bg-' + id + '-preview');
            if (!c) continue;
            const cx = c.getContext('2d');
            c.width = 48; c.height = 36;
            cx.fillStyle = theme.sky; cx.fillRect(0, 0, 48, 36);
            cx.fillStyle = theme.skyTop; cx.fillRect(0, 0, 48, 12);
            cx.fillStyle = theme.ground; cx.fillRect(0, 28, 48, 8);
            if (theme.stars) { cx.fillStyle = '#fff'; for (let i = 0; i < 8; i++) cx.fillRect((i*7+3)%44, (i*5+2)%20, 2, 2); }
            if (theme.clouds) { cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.beginPath(); cx.arc(15,10,5,0,Math.PI*2); cx.fill(); cx.beginPath(); cx.arc(35,8,4,0,Math.PI*2); cx.fill(); }
        }
    }

    function selectCharacter(c) {
        initAudio();
        character = c;
        document.getElementById('char-select').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        startGame();
    }

    function selectBallColor(c, el) {
        ballColorChoice = c;
        el.parentElement.querySelectorAll('.fruit-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    function selectBg(m, el) {
        bgMode = m;
        el.parentElement.querySelectorAll('.fruit-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    function backToSelect() {
        running = false;
        if (animFrame) cancelAnimationFrame(animFrame);
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('char-select').style.display = 'block';
    }

    function startGame() {
        paddleX = W / 2 - PADDLE_W / 2;
        ballX = W / 2;
        ballY = PADDLE_Y - BALL_R - 1;
        const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
        ballDX = Math.cos(angle) * BALL_SPEED;
        ballDY = Math.sin(angle) * BALL_SPEED;
        score = 0; lives = 3;
        bricks = [];
        for (let row = 0; row < BRICK_ROWS; row++) {
            for (let col = 0; col < BRICK_COLS; col++) {
                bricks.push({
                    x: col * (BRICK_W + BRICK_PAD) + BRICK_PAD,
                    y: BRICK_TOP + row * (BRICK_H + BRICK_PAD),
                    w: BRICK_W, h: BRICK_H,
                    color: ROW_COLORS[row], alive: true,
                    points: (BRICK_ROWS - row) * 10,
                });
            }
        }
        running = true;
        document.getElementById('game-over').style.display = 'none';
        updateHUD();
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(loop);
    }

    function updateHUD() {
        document.getElementById('score').textContent = score;
        document.getElementById('lives').textContent = '❤'.repeat(lives);
    }

    function loop() {
        if (!running) return;
        update();
        draw();
        animFrame = requestAnimationFrame(loop);
    }

    function update() {
        const speed = 7;
        if (keys['ArrowLeft'] || keys['a']) paddleX = Math.max(0, paddleX - speed);
        if (keys['ArrowRight'] || keys['d']) paddleX = Math.min(W - PADDLE_W, paddleX + speed);

        ballX += ballDX; ballY += ballDY;

        if (ballX - BALL_R <= 0) { ballX = BALL_R; ballDX = Math.abs(ballDX); }
        if (ballX + BALL_R >= W) { ballX = W - BALL_R; ballDX = -Math.abs(ballDX); }
        if (ballY - BALL_R <= 0) { ballY = BALL_R; ballDY = Math.abs(ballDY); }

        if (ballDY > 0 && ballY + BALL_R >= PADDLE_Y && ballY + BALL_R <= PADDLE_Y + PADDLE_H + 4 &&
            ballX >= paddleX && ballX <= paddleX + PADDLE_W) {
            ballDY = -Math.abs(ballDY);
            ballDX = ((ballX - paddleX) / PADDLE_W - 0.5) * 6;
            ballY = PADDLE_Y - BALL_R;
            playCatch();
        }

        if (ballY - BALL_R > H) {
            lives--; updateHUD(); playDrop();
            if (lives <= 0) { endGame(false); return; }
            ballX = paddleX + PADDLE_W / 2;
            ballY = PADDLE_Y - BALL_R - 1;
            const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
            ballDX = Math.cos(angle) * BALL_SPEED;
            ballDY = Math.sin(angle) * BALL_SPEED;
        }

        let allDead = true;
        for (const b of bricks) {
            if (!b.alive) continue;
            allDead = false;
            if (ballX + BALL_R > b.x && ballX - BALL_R < b.x + b.w &&
                ballY + BALL_R > b.y && ballY - BALL_R < b.y + b.h) {
                b.alive = false; score += b.points; updateHUD(); playCatch();
                const ox = Math.min(ballX + BALL_R - b.x, b.x + b.w - (ballX - BALL_R));
                const oy = Math.min(ballY + BALL_R - b.y, b.y + b.h - (ballY - BALL_R));
                if (ox < oy) ballDX = -ballDX; else ballDY = -ballDY;
                break;
            }
        }
        if (allDead) endGame(true);
    }

    function drawCloud(ctx, x, y, size) {
        ctx.beginPath();
        ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
        ctx.arc(x + size * 0.3, y - size * 0.15, size * 0.35, 0, Math.PI * 2);
        ctx.arc(x + size * 0.6, y, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        const bg = BG_THEMES[bgMode] || BG_THEMES.meadow;

        ctx.fillStyle = bg.sky; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = bg.skyTop; ctx.fillRect(0, 0, W, H / 4);

        if (bg.stars) {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 40; i++) ctx.fillRect((i*97+13)%W, (i*53+7)%(H-100), 2, 2);
        }
        if (bg.clouds) {
            ctx.fillStyle = bgMode === 'sunset' ? 'rgba(255,255,255,0.3)' : bgMode === 'snow' ? 'rgba(255,255,255,0.6)' : '#fff';
            drawCloud(ctx, 50, 60, 50); drawCloud(ctx, 250, 30, 40); drawCloud(ctx, 400, 70, 35);
        }

        ctx.fillStyle = bg.ground; ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
        ctx.fillStyle = bg.groundLine; ctx.fillRect(0, H - GROUND_H, W, 4);
        ctx.fillStyle = bg.tufts;
        for (let i = 0; i < W; i += 12) ctx.fillRect(i, H - GROUND_H - 2, 3, 4);

        // Bricks
        for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 3); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3);
        }

        // Character standing on ground
        const charX = paddleX + PADDLE_W / 2 - CHAR_SIZE / 2;
        const charY = H - GROUND_H - CHAR_SIZE;
        if (character === 'oto') drawOto(ctx, charX, charY, CHAR_SIZE);
        else drawLujza(ctx, charX, charY, CHAR_SIZE);

        // Paddle on character's head
        ctx.fillStyle = '#A0522D';
        ctx.beginPath(); ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 4); ctx.fill();
        ctx.fillStyle = '#CD853F';
        ctx.fillRect(paddleX + 3, PADDLE_Y + 2, PADDLE_W - 6, PADDLE_H / 3);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(paddleX + 2, PADDLE_Y + PADDLE_H - 4, PADDLE_W - 4, 2);

        // Ball
        const bc = BALL_COLORS_MAP[ballColorChoice] || '#fff';
        ctx.fillStyle = bc;
        ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R + 3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;

        // Lives as hearts
        for (let i = 0; i < lives; i++) drawHeart(ctx, W - 30 - i * 25, 10, 20);

        // Score
        ctx.fillStyle = '#1a1a2e';
        ctx.font = '12px "Press Start 2P", monospace';
        ctx.fillText('Skóre: ' + score, 10, 22);
    }

    function endGame(won) {
        running = false;
        cancelAnimationFrame(animFrame);
        if (won) playCatch(); else playGameOver();
        document.getElementById('end-title').textContent = won ? 'Výborne! 🎉' : 'Koniec hry!';
        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over').style.display = 'block';
    }

    window.addEventListener('load', init);
    </script>
</body>
</html>
