<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múr - Oto & Lujza</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem;
            overflow: hidden;
        }
        a.back { position: absolute; top: 0.5rem; left: 1rem; color: #888; text-decoration: none; font-size: 0.6rem; z-index: 10; }
        a.back:hover { color: #e94560; }
        h1 { font-size: clamp(0.8rem, 3vw, 1.2rem); color: #e94560; text-shadow: 2px 2px 0 #0f3460; margin: 0.3rem 0; }
        #hud { font-size: 0.55rem; margin-bottom: 0.3rem; display: flex; gap: 1.5rem; }
        #hud span { color: #e94560; }
        canvas {
            border: 2px solid #0f3460; border-radius: 4px;
            max-width: 100%; max-height: calc(100dvh - 80px);
        }
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; z-index: 10;
        }
        #game-over h2 { font-size: 1.2rem; color: #e94560; margin-bottom: 0.5rem; }
        #game-over .score { font-size: 0.7rem; margin-bottom: 1rem; }
        #game-over button {
            font-family: 'Press Start 2P', monospace; font-size: 0.6rem;
            padding: 0.6rem 1.2rem; background: #e94560; color: white;
            border: none; border-radius: 4px; cursor: pointer; margin: 0.2rem;
        }
        #game-over button:hover { background: #c73652; }
        #mobile-controls {
            display: none; justify-content: center; gap: 2rem; padding: 0.3rem 0;
        }
        #mobile-controls button {
            font-size: 2rem; width: 70px; height: 50px;
            border: 3px solid #0f3460; border-radius: 8px;
            background: #16213e; color: #e0e0e0; cursor: pointer;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        #mobile-controls button:active { background: #e94560; border-color: #e94560; }
        @media (pointer: coarse) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>
    <a href="/" class="back">&larr; hry</a>
    <h1>Múr</h1>
    <div id="hud">
        <div>Skóre: <span id="score">0</span></div>
        <div>Životy: <span id="lives">❤❤❤</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="mobile-controls">
        <button id="btn-left">&#9664;</button>
        <button id="btn-right">&#9654;</button>
    </div>
    <div id="game-over">
        <h2 id="end-title">Koniec hry!</h2>
        <div class="score">Skóre: <span id="final-score">0</span></div>
        <button onclick="startGame()">Hrať znova</button>
    </div>

    <script>
    const W = 480, H = 600;
    const PADDLE_W = 80, PADDLE_H = 12, PADDLE_Y = H - 30;
    const BALL_R = 6;
    const BRICK_ROWS = 6, BRICK_COLS = 10;
    const BRICK_W = W / BRICK_COLS - 2, BRICK_H = 18;
    const BRICK_PAD = 2, BRICK_TOP = 50;
    const ROW_COLORS = ['#e94560', '#f39c12', '#f4d03f', '#2ecc71', '#3498db', '#9b59b6'];
    const BALL_SPEED_START = 4;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = W;
    canvas.height = H;

    let paddleX, ballX, ballY, ballDX, ballDY;
    let bricks, score, lives, running, animFrame;
    let keys = {};

    document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === 'Escape' && running) endGame(false);
    });
    document.addEventListener('keyup', e => keys[e.key] = false);

    // Mobile controls
    const leftBtn = document.getElementById('btn-left');
    const rightBtn = document.getElementById('btn-right');
    leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
    leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
    leftBtn.addEventListener('touchcancel', () => keys['ArrowLeft'] = false);
    rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
    rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
    rightBtn.addEventListener('touchcancel', () => keys['ArrowRight'] = false);
    document.addEventListener('touchend', () => {
        if (!leftBtn.matches(':active')) keys['ArrowLeft'] = false;
        if (!rightBtn.matches(':active')) keys['ArrowRight'] = false;
    });

    function startGame() {
        paddleX = W / 2 - PADDLE_W / 2;
        ballX = W / 2;
        ballY = PADDLE_Y - BALL_R - 1;
        const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
        ballDX = Math.cos(angle) * BALL_SPEED_START;
        ballDY = Math.sin(angle) * BALL_SPEED_START;

        score = 0;
        lives = 3;
        bricks = [];
        for (let row = 0; row < BRICK_ROWS; row++) {
            for (let col = 0; col < BRICK_COLS; col++) {
                bricks.push({
                    x: col * (BRICK_W + BRICK_PAD) + BRICK_PAD,
                    y: BRICK_TOP + row * (BRICK_H + BRICK_PAD),
                    w: BRICK_W, h: BRICK_H,
                    color: ROW_COLORS[row],
                    alive: true,
                    points: (BRICK_ROWS - row) * 10,
                });
            }
        }

        running = true;
        document.getElementById('game-over').style.display = 'none';
        updateHUD();
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(loop);
    }

    function updateHUD() {
        document.getElementById('score').textContent = score;
        document.getElementById('lives').textContent = '❤'.repeat(lives);
    }

    function loop() {
        if (!running) return;
        update();
        draw();
        animFrame = requestAnimationFrame(loop);
    }

    function update() {
        // Move paddle
        const speed = 7;
        if (keys['ArrowLeft'] || keys['a']) paddleX = Math.max(0, paddleX - speed);
        if (keys['ArrowRight'] || keys['d']) paddleX = Math.min(W - PADDLE_W, paddleX + speed);

        // Move ball
        ballX += ballDX;
        ballY += ballDY;

        // Wall collisions
        if (ballX - BALL_R <= 0) { ballX = BALL_R; ballDX = Math.abs(ballDX); }
        if (ballX + BALL_R >= W) { ballX = W - BALL_R; ballDX = -Math.abs(ballDX); }
        if (ballY - BALL_R <= 0) { ballY = BALL_R; ballDY = Math.abs(ballDY); }

        // Paddle collision
        if (ballDY > 0 &&
            ballY + BALL_R >= PADDLE_Y &&
            ballY + BALL_R <= PADDLE_Y + PADDLE_H + 4 &&
            ballX >= paddleX && ballX <= paddleX + PADDLE_W) {
            ballDY = -Math.abs(ballDY);
            // Angle based on where ball hits paddle
            const hit = (ballX - paddleX) / PADDLE_W - 0.5;
            ballDX = hit * 6;
            ballY = PADDLE_Y - BALL_R;
        }

        // Ball lost
        if (ballY - BALL_R > H) {
            lives--;
            updateHUD();
            if (lives <= 0) {
                endGame(false);
                return;
            }
            // Reset ball
            ballX = paddleX + PADDLE_W / 2;
            ballY = PADDLE_Y - BALL_R - 1;
            const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
            ballDX = Math.cos(angle) * BALL_SPEED_START;
            ballDY = Math.sin(angle) * BALL_SPEED_START;
        }

        // Brick collisions
        let allDead = true;
        for (const b of bricks) {
            if (!b.alive) continue;
            allDead = false;
            if (ballX + BALL_R > b.x && ballX - BALL_R < b.x + b.w &&
                ballY + BALL_R > b.y && ballY - BALL_R < b.y + b.h) {
                b.alive = false;
                score += b.points;
                updateHUD();

                // Determine bounce direction
                const overlapX = Math.min(ballX + BALL_R - b.x, b.x + b.w - (ballX - BALL_R));
                const overlapY = Math.min(ballY + BALL_R - b.y, b.y + b.h - (ballY - BALL_R));
                if (overlapX < overlapY) {
                    ballDX = -ballDX;
                } else {
                    ballDY = -ballDY;
                }
                break;
            }
        }

        if (allDead) endGame(true);
    }

    function draw() {
        // Background
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, W, H);

        // Bricks
        for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.roundRect(b.x, b.y, b.w, b.h, 3);
            ctx.fill();
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3);
        }

        // Paddle
        ctx.fillStyle = '#e0e0e0';
        ctx.beginPath();
        ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 4);
        ctx.fill();
        // Paddle highlight
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(paddleX + 3, PADDLE_Y + 2, PADDLE_W - 6, PADDLE_H / 3);

        // Ball
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
        ctx.fill();
        // Ball glow
        ctx.fillStyle = 'rgba(233,69,96,0.3)';
        ctx.beginPath();
        ctx.arc(ballX, ballY, BALL_R + 3, 0, Math.PI * 2);
        ctx.fill();

        // Score on canvas
        ctx.fillStyle = '#555';
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.fillText('Skóre: ' + score, 10, 20);
    }

    function endGame(won) {
        running = false;
        cancelAnimationFrame(animFrame);
        const title = document.getElementById('end-title');
        title.textContent = won ? 'Výborne! 🎉' : 'Koniec hry!';
        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over').style.display = 'block';
    }

    startGame();
    </script>
</body>
</html>
