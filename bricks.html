<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múr - Oto & Lujza</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="/" style="position:absolute; top:1rem; left:1.5rem; color:#888; text-decoration:none; font-size:0.7rem; font-family:'Press Start 2P',monospace;" onmouseover="this.style.color='#e94560'" onmouseout="this.style.color='#888'">&larr; hry</a>
    <h1>Múr</h1>
    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
        <p class="subtitle" style="margin:0">rozbi všetky tehly</p>
        <button class="leaderboard-btn" onclick="showLeaderboard()" style="margin:0; font-size:0.55rem; padding:0.4rem 0.8rem;">🏆 Rebríček</button>
    </div>

    <div id="char-select">
        <h2>Vyber si postavu</h2>
        <div class="char-options">
            <div class="char-option" onclick="selectCharacter('oto')">
                <canvas id="oto-preview"></canvas>
                <div class="name">Oto</div>
                <div class="subtitle">ježko</div>
            </div>
            <div class="char-option" onclick="selectCharacter('lujza')">
                <canvas id="lujza-preview"></canvas>
                <div class="name">Lujza</div>
                <div class="subtitle">veverička</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si loptu</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBallColor('white', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#fff;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('red', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#e94560;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('yellow', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#f4d03f;margin:8px auto;"></div>
            </div>
            <div class="fruit-option" onclick="selectBallColor('cyan', this)">
                <div style="width:16px;height:16px;border-radius:50%;background:#0ff;margin:8px auto;"></div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si pálku</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectPaddle('log', this)">
                <canvas id="paddle-log-preview"></canvas>
                <div class="subtitle">kmeň</div>
            </div>
            <div class="fruit-option" onclick="selectPaddle('stone', this)">
                <canvas id="paddle-stone-preview"></canvas>
                <div class="subtitle">kameň</div>
            </div>
            <div class="fruit-option" onclick="selectPaddle('mushroom', this)">
                <canvas id="paddle-mushroom-preview"></canvas>
                <div class="subtitle">hríb</div>
            </div>
        </div>

        <h2 class="fruit-title">Vyber si pozadie</h2>
        <div class="fruit-options">
            <div class="fruit-option active" onclick="selectBg('meadow', this)">
                <canvas id="bg-meadow-preview"></canvas>
                <div class="subtitle">lúka</div>
            </div>
            <div class="fruit-option" onclick="selectBg('sunset', this)">
                <canvas id="bg-sunset-preview"></canvas>
                <div class="subtitle">západ</div>
            </div>
            <div class="fruit-option" onclick="selectBg('night', this)">
                <canvas id="bg-night-preview"></canvas>
                <div class="subtitle">noc</div>
            </div>
            <div class="fruit-option" onclick="selectBg('snow', this)">
                <canvas id="bg-snow-preview"></canvas>
                <div class="subtitle">sneh</div>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display:none; position:relative;">
        <div id="hud">
            <div>Skóre: <span id="score">0</span></div>
            <div id="lives">❤❤❤</div>
        </div>
        <canvas id="game"></canvas>
        <div id="mobile-controls">
            <button id="btn-left">&#9664;</button>
            <button id="btn-right">&#9654;</button>
        </div>
        <div id="game-over">
            <h2 id="end-title">Koniec hry!</h2>
            <div class="score">Skóre: <span id="final-score">0</span></div>
            <div id="name-input-area">
                <input type="text" id="player-name" placeholder="Tvoje meno" maxlength="20"
                    autocomplete="off" spellcheck="false"
                    style="font-family:'Press Start 2P',monospace; font-size:0.6rem; padding:0.6rem 1rem; border:2px solid #0f3460; border-radius:4px; background:#16213e; color:#e0e0e0; outline:none; width:180px; margin-bottom:0.5rem;">
                <button onclick="submitScore()">Uložiť skóre</button>
            </div>
            <button onclick="startGame()">Hrať znova</button>
            <button onclick="backToSelect()">Zmeniť postavu</button>
        </div>
    </div>

    <div id="leaderboard" style="display:none; text-align:center; max-width:400px; width:90vw;">
        <h2 style="font-size:1.2rem; color:#e94560; margin-bottom:1rem;">Rebríček</h2>
        <div class="lb-tabs" style="display:flex; justify-content:center; gap:0.5rem; margin-bottom:1rem;">
            <button class="lb-tab active" onclick="switchTab('weekly', this)" style="font-family:'Press Start 2P',monospace; font-size:0.6rem; padding:0.5rem 1rem; border:2px solid #0f3460; border-radius:4px; background:transparent; color:#e94560; cursor:pointer; border-color:#e94560;">Týždeň</button>
            <button class="lb-tab" onclick="switchTab('total', this)" style="font-family:'Press Start 2P',monospace; font-size:0.6rem; padding:0.5rem 1rem; border:2px solid #0f3460; border-radius:4px; background:transparent; color:#888; cursor:pointer;">Celkovo</button>
        </div>
        <div id="lb-list"></div>
        <button onclick="hideLeaderboard()" style="font-family:'Press Start 2P',monospace; font-size:0.6rem; padding:0.6rem 1.2rem; background:#e94560; color:white; border:none; border-radius:4px; cursor:pointer; margin-top:1rem;">Späť</button>
    </div>

    <script src="/static/js/sprites.js"></script>
    <script src="/static/js/sounds.js"></script>
    <script>
    const W = 480, H = 640;
    const PADDLE_W = 80, PADDLE_H = 14;
    const CHAR_SIZE = 40;
    const GROUND_H = 30;
    const PADDLE_Y = H - GROUND_H - CHAR_SIZE - PADDLE_H + 6;
    const BALL_R = 6;
    const BRICK_ROWS = 6, BRICK_COLS = 10;
    const BRICK_W = W / BRICK_COLS - 2, BRICK_H = 18;
    const BRICK_PAD = 2, BRICK_TOP = 40;
    const ROW_COLORS = ['#e94560', '#f39c12', '#f4d03f', '#2ecc71', '#3498db', '#9b59b6'];
    const BALL_SPEED_START = 2.5;
    const BALL_SPEED_INCREMENT = 0.0003;
    let ballSpeed;

    const BG_THEMES = {
        meadow: { sky: '#87CEEB', skyTop: '#B0E0FF', ground: '#2ecc71', groundLine: '#27ae60', tufts: '#1e8449', clouds: true },
        sunset: { sky: '#e67e22', skyTop: '#f39c12', ground: '#5a3e2b', groundLine: '#4a2e1b', tufts: '#3a2010', clouds: true },
        night: { sky: '#1a1a3e', skyTop: '#0d0d2b', ground: '#1a3a1a', groundLine: '#0f2a0f', tufts: '#0a200a', stars: true },
        snow: { sky: '#c8d8e8', skyTop: '#dce8f0', ground: '#f0f0f5', groundLine: '#dde0e8', tufts: '#c8ccd5', clouds: true },
    };
    const BALL_COLORS_MAP = { white: '#fff', red: '#e94560', yellow: '#f4d03f', cyan: '#0ff' };

    let canvas, ctx;
    let character = null;
    let ballColorChoice = 'white';
    let paddleStyle = 'log';
    let bgMode = 'meadow';
    let paddleX, ballX, ballY, ballDX, ballDY;
    let bricks, score, lives, running, animFrame;
    let keys = {};

    function init() {
        canvas = document.getElementById('game');
        ctx = canvas.getContext('2d');
        canvas.width = W;
        canvas.height = H;

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'Escape' && running) endGame(false);
        });
        document.addEventListener('keyup', e => keys[e.key] = false);

        const leftBtn = document.getElementById('btn-left');
        const rightBtn = document.getElementById('btn-right');
        leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
        leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
        leftBtn.addEventListener('touchcancel', () => keys['ArrowLeft'] = false);
        rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
        rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
        rightBtn.addEventListener('touchcancel', () => keys['ArrowRight'] = false);
        document.addEventListener('touchend', () => {
            if (!leftBtn.matches(':active')) keys['ArrowLeft'] = false;
            if (!rightBtn.matches(':active')) keys['ArrowRight'] = false;
        });

        setupPreviews();
    }

    function setupPreviews() {
        const otoC = document.getElementById('oto-preview');
        otoC.width = 64; otoC.height = 64;
        drawOto(otoC.getContext('2d'), 8, 8, 48);

        const lujzaC = document.getElementById('lujza-preview');
        lujzaC.width = 64; lujzaC.height = 64;
        drawLujza(lujzaC.getContext('2d'), 8, 8, 48);

        // Paddle previews
        const paddlePreviews = { 'paddle-log-preview': 'log', 'paddle-stone-preview': 'stone', 'paddle-mushroom-preview': 'mushroom' };
        for (const [id, style] of Object.entries(paddlePreviews)) {
            const c = document.getElementById(id);
            if (!c) continue;
            const cx = c.getContext('2d'); c.width = 48; c.height = 28;
            drawPaddleStyle(cx, 4, 8, 40, 12, style);
        }

        for (const [id, theme] of Object.entries(BG_THEMES)) {
            const c = document.getElementById('bg-' + id + '-preview');
            if (!c) continue;
            const cx = c.getContext('2d');
            c.width = 48; c.height = 36;
            cx.fillStyle = theme.sky; cx.fillRect(0, 0, 48, 36);
            cx.fillStyle = theme.skyTop; cx.fillRect(0, 0, 48, 12);
            cx.fillStyle = theme.ground; cx.fillRect(0, 28, 48, 8);
            if (theme.stars) { cx.fillStyle = '#fff'; for (let i = 0; i < 8; i++) cx.fillRect((i*7+3)%44, (i*5+2)%20, 2, 2); }
            if (theme.clouds) { cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.beginPath(); cx.arc(15,10,5,0,Math.PI*2); cx.fill(); cx.beginPath(); cx.arc(35,8,4,0,Math.PI*2); cx.fill(); }
        }
    }

    function selectCharacter(c) {
        initAudio();
        character = c;
        document.getElementById('char-select').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        startGame();
    }

    function selectBallColor(c, el) {
        ballColorChoice = c;
        el.parentElement.querySelectorAll('.fruit-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    function selectPaddle(s, el) {
        paddleStyle = s;
        el.parentElement.querySelectorAll('.fruit-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    function selectBg(m, el) {
        bgMode = m;
        el.parentElement.querySelectorAll('.fruit-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    function backToSelect() {
        running = false;
        if (animFrame) cancelAnimationFrame(animFrame);
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('char-select').style.display = 'block';
    }

    function startGame() {
        paddleX = W / 2 - PADDLE_W / 2;
        ballX = W / 2;
        ballY = PADDLE_Y - BALL_R - 1;
        score = 0; lives = 3; ballSpeed = BALL_SPEED_START;
        const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
        ballDX = Math.cos(angle) * ballSpeed;
        ballDY = Math.sin(angle) * ballSpeed;
        bricks = [];
        for (let row = 0; row < BRICK_ROWS; row++) {
            for (let col = 0; col < BRICK_COLS; col++) {
                bricks.push({
                    x: col * (BRICK_W + BRICK_PAD) + BRICK_PAD,
                    y: BRICK_TOP + row * (BRICK_H + BRICK_PAD),
                    w: BRICK_W, h: BRICK_H,
                    color: ROW_COLORS[row], alive: true,
                    points: (BRICK_ROWS - row) * 10,
                });
            }
        }
        running = true;
        document.getElementById('game-over').style.display = 'none';
        updateHUD();
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(loop);
    }

    function updateHUD() {
        document.getElementById('score').textContent = score;
        document.getElementById('lives').textContent = '❤'.repeat(lives);
    }

    function loop() {
        if (!running) return;
        update();
        draw();
        animFrame = requestAnimationFrame(loop);
    }

    function update() {
        const speed = 7;
        if (keys['ArrowLeft'] || keys['a']) paddleX = Math.max(0, paddleX - speed);
        if (keys['ArrowRight'] || keys['d']) paddleX = Math.min(W - PADDLE_W, paddleX + speed);

        ballSpeed += BALL_SPEED_INCREMENT;
        // Normalize and apply current speed
        const mag = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
        if (mag > 0) { ballDX = (ballDX / mag) * ballSpeed; ballDY = (ballDY / mag) * ballSpeed; }
        ballX += ballDX; ballY += ballDY;

        if (ballX - BALL_R <= 0) { ballX = BALL_R; ballDX = Math.abs(ballDX); }
        if (ballX + BALL_R >= W) { ballX = W - BALL_R; ballDX = -Math.abs(ballDX); }
        if (ballY - BALL_R <= 0) { ballY = BALL_R; ballDY = Math.abs(ballDY); }

        if (ballDY > 0 && ballY + BALL_R >= PADDLE_Y && ballY + BALL_R <= PADDLE_Y + PADDLE_H + 4 &&
            ballX >= paddleX && ballX <= paddleX + PADDLE_W) {
            ballDY = -Math.abs(ballDY);
            ballDX = ((ballX - paddleX) / PADDLE_W - 0.5) * 6;
            ballY = PADDLE_Y - BALL_R;
            playCatch();
        }

        if (ballY - BALL_R > H) {
            lives--; updateHUD(); playDrop();
            if (lives <= 0) { endGame(false); return; }
            ballX = paddleX + PADDLE_W / 2;
            ballY = PADDLE_Y - BALL_R - 1;
            const angle = (-0.5 + Math.random()) * 0.8 - Math.PI / 2;
            ballDX = Math.cos(angle) * ballSpeed;
            ballDY = Math.sin(angle) * ballSpeed;
        }

        let allDead = true;
        for (const b of bricks) {
            if (!b.alive) continue;
            allDead = false;
            if (ballX + BALL_R > b.x && ballX - BALL_R < b.x + b.w &&
                ballY + BALL_R > b.y && ballY - BALL_R < b.y + b.h) {
                b.alive = false; score += b.points; updateHUD(); playCatch();
                const ox = Math.min(ballX + BALL_R - b.x, b.x + b.w - (ballX - BALL_R));
                const oy = Math.min(ballY + BALL_R - b.y, b.y + b.h - (ballY - BALL_R));
                if (ox < oy) ballDX = -ballDX; else ballDY = -ballDY;
                break;
            }
        }
        if (allDead) endGame(true);
    }

    function drawPaddleStyle(ctx, x, y, w, h, style) {
        if (style === 'log') {
            // Tree trunk / log
            ctx.fillStyle = '#8B5E3C';
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 5); ctx.fill();
            ctx.fillStyle = '#A07050';
            ctx.fillRect(x + 3, y + 2, w - 6, h / 3);
            // Bark lines
            ctx.strokeStyle = '#6B4226'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x + w * 0.25, y); ctx.lineTo(x + w * 0.25, y + h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w * 0.5, y); ctx.lineTo(x + w * 0.5, y + h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w * 0.75, y); ctx.lineTo(x + w * 0.75, y + h); ctx.stroke();
            // Ring on ends
            ctx.fillStyle = '#D4A56A';
            ctx.beginPath(); ctx.ellipse(x + 2, y + h / 2, 3, h / 2 - 1, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x + w - 2, y + h / 2, 3, h / 2 - 1, 0, 0, Math.PI * 2); ctx.fill();
        } else if (style === 'stone') {
            // Flat stone slab
            ctx.fillStyle = '#778899';
            ctx.beginPath(); ctx.roundRect(x, y + 2, w, h - 2, 3); ctx.fill();
            ctx.fillStyle = '#8a9aaa';
            ctx.fillRect(x + 3, y + 3, w - 6, (h - 2) / 3);
            // Cracks
            ctx.strokeStyle = '#667788'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x + w * 0.3, y + 2); ctx.lineTo(x + w * 0.35, y + h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w * 0.65, y + 3); ctx.lineTo(x + w * 0.6, y + h - 1); ctx.stroke();
            // Moss spots
            ctx.fillStyle = '#5a8a5a';
            ctx.fillRect(x + 5, y + h - 4, 4, 2);
            ctx.fillRect(x + w - 12, y + h - 5, 5, 2);
        } else if (style === 'mushroom') {
            // Mushroom cap (wide, flat)
            ctx.fillStyle = '#cc3333';
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2 + 1, 0, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = '#ee5555';
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2 - 1, w / 2 - 2, h / 3, 0, Math.PI, 0);
            ctx.fill();
            // White spots
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x + w * 0.25, y + 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + w * 0.55, y + 2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + w * 0.8, y + 4, 2, 0, Math.PI * 2); ctx.fill();
            // Bottom (gills)
            ctx.fillStyle = '#f0d0a0';
            ctx.fillRect(x + w * 0.15, y + h / 2, w * 0.7, h / 2);
        }
    }

    function drawCloud(ctx, x, y, size) {
        ctx.beginPath();
        ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
        ctx.arc(x + size * 0.3, y - size * 0.15, size * 0.35, 0, Math.PI * 2);
        ctx.arc(x + size * 0.6, y, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        const bg = BG_THEMES[bgMode] || BG_THEMES.meadow;

        ctx.fillStyle = bg.sky; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = bg.skyTop; ctx.fillRect(0, 0, W, H / 4);

        if (bg.stars) {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 40; i++) ctx.fillRect((i*97+13)%W, (i*53+7)%(H-100), 2, 2);
        }
        if (bg.clouds) {
            ctx.fillStyle = bgMode === 'sunset' ? 'rgba(255,255,255,0.3)' : bgMode === 'snow' ? 'rgba(255,255,255,0.6)' : '#fff';
            drawCloud(ctx, 50, 60, 50); drawCloud(ctx, 250, 30, 40); drawCloud(ctx, 400, 70, 35);
        }

        ctx.fillStyle = bg.ground; ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
        ctx.fillStyle = bg.groundLine; ctx.fillRect(0, H - GROUND_H, W, 4);
        ctx.fillStyle = bg.tufts;
        for (let i = 0; i < W; i += 12) ctx.fillRect(i, H - GROUND_H - 2, 3, 4);

        // Bricks
        for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 3); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3);
        }

        // Character standing on ground
        const charX = paddleX + PADDLE_W / 2 - CHAR_SIZE / 2;
        const charY = H - GROUND_H - CHAR_SIZE;
        if (character === 'oto') drawOto(ctx, charX, charY, CHAR_SIZE);
        else drawLujza(ctx, charX, charY, CHAR_SIZE);

        // Paddle on character's head
        drawPaddleStyle(ctx, paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, paddleStyle);

        // Ball
        const bc = BALL_COLORS_MAP[ballColorChoice] || '#fff';
        ctx.fillStyle = bc;
        ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R + 3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;

        // Lives as hearts
        for (let i = 0; i < lives; i++) drawHeart(ctx, W - 30 - i * 25, 10, 20);

        // Score
        ctx.fillStyle = '#1a1a2e';
        ctx.font = '12px "Press Start 2P", monospace';
        ctx.fillText('Skóre: ' + score, 10, 22);
    }

    let highScore = 0;

    async function fetchHighScore() {
        try {
            const resp = await fetch('api/scores');
            const data = await resp.json();
            if (data.total && data.total.length > 0) {
                highScore = data.total[0].score;
            }
        } catch (e) {}
    }

    async function endGame(won) {
        running = false;
        cancelAnimationFrame(animFrame);
        if (won) playCatch(); else playGameOver();
        document.getElementById('end-title').textContent = won ? 'Výborne! 🎉' : 'Koniec hry!';
        document.getElementById('final-score').textContent = score;

        // Check if top 15
        let isTop = false;
        try {
            const resp = await fetch('api/scores');
            const data = await resp.json();
            const topScores = data.total || [];
            isTop = topScores.length < 15 || score > (topScores[topScores.length - 1]?.score || 0);
        } catch (e) { isTop = true; }

        if (isTop && score > 0) {
            const savedName = localStorage.getItem('vinte-player-name') || '';
            if (savedName) {
                document.getElementById('name-input-area').style.display = 'none';
                try {
                    await fetch('api/scores', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({name: savedName, score, character, extra: paddleStyle}),
                    });
                } catch (e) {}
                if (score > highScore) highScore = score;
                document.getElementById('game-over').style.display = 'none';
                document.getElementById('game-screen').style.display = 'none';
                await showLeaderboard();
                return;
            }
            document.getElementById('name-input-area').style.display = 'block';
            document.getElementById('player-name').value = '';
            document.getElementById('player-name').focus();
        } else {
            document.getElementById('name-input-area').style.display = 'none';
        }
        document.getElementById('game-over').style.display = 'block';
    }

    async function submitScore() {
        const nameInput = document.getElementById('player-name');
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }
        localStorage.setItem('vinte-player-name', name);
        try {
            await fetch('api/scores', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, score, character, extra: paddleStyle}),
            });
        } catch (e) {}
        if (score > highScore) highScore = score;
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        await showLeaderboard();
    }

    let currentLbTab = 'weekly';
    let lbData = null;

    async function showLeaderboard() {
        document.getElementById('char-select').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('leaderboard').style.display = 'block';
        try {
            const resp = await fetch('/api/scores/bricks');
            lbData = await resp.json();
        } catch (e) { lbData = {total: [], weekly: []}; }
        renderLeaderboard();
    }

    function hideLeaderboard() {
        document.getElementById('leaderboard').style.display = 'none';
        document.getElementById('char-select').style.display = 'block';
    }

    function switchTab(tab, btn) {
        currentLbTab = tab;
        document.querySelectorAll('.lb-tab').forEach(t => { t.classList.remove('active'); t.style.borderColor = '#0f3460'; t.style.color = '#888'; });
        btn.classList.add('active'); btn.style.borderColor = '#e94560'; btn.style.color = '#e94560';
        renderLeaderboard();
    }

    function renderLeaderboard() {
        const list = document.getElementById('lb-list');
        const data = lbData ? lbData[currentLbTab] : [];
        if (!data || data.length === 0) {
            list.innerHTML = '<p style="color:#555; font-size:0.6rem; padding:2rem 0;">Zatiaľ žiadne skóre</p>';
            return;
        }
        const playerName = localStorage.getItem('vinte-player-name') || '';
        let highlighted = false;
        list.innerHTML = data.map((entry, i) => {
            const isPlayer = !highlighted && entry.name === playerName && entry.score === score;
            if (isPlayer) highlighted = true;
            return `<div style="display:flex; justify-content:space-between; padding:0.4rem 0.8rem; font-size:0.6rem; border-bottom:1px solid #0f3460; ${isPlayer ? 'background:#0f3460; border-radius:4px;' : ''}">
                <span style="color:#e94560; width:2rem; text-align:left;">${i + 1}.</span>
                <span style="flex:1; text-align:left; ${isPlayer ? 'color:#e94560;' : ''}">${entry.name}</span>
                <span style="color:#e94560; width:4rem; text-align:right;">${entry.score}</span>
            </div>`;
        }).join('');
    }

    window.addEventListener('load', () => { init(); fetchHighScore(); });
    </script>
</body>
</html>
