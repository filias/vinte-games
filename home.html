<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hry s Otom a Lujzou</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .characters {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #e94560;
            text-shadow: 3px 3px 0 #0f3460;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 2.5rem;
            text-align: center;
            line-height: 2;
            max-width: 500px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            max-width: 600px;
        }
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 2rem;
            border: 3px solid #0f3460;
            border-radius: 12px;
            background: #16213e;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.2s;
            width: 220px;
        }
        .game-card:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }
        .game-card canvas {
            margin-bottom: 0.8rem;
        }
        .game-card .name {
            font-family: system-ui, sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 0.5rem;
        }
        .game-card .desc {
            font-family: system-ui, sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.5rem;
            color: #444;
            text-align: center;
            line-height: 2;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
        .footer a:hover {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="characters">
        <canvas id="oto-preview" width="80" height="80"></canvas>
        <canvas id="lujza-preview" width="80" height="80"></canvas>
    </div>
    <h1>Oto & Lujza</h1>
    <p class="subtitle">
        Jednoduché hry s Otom a Lujzou.<br>
        Niektoré sa dotýkajú tém z učebníc,<br>
        iné sú len pre zábavu.
    </p>

    <div class="games">
        <a href="/apples/" class="game-card">
            <canvas id="apple-preview" width="48" height="48"></canvas>
            <div class="name">Chytaj Jablká</div>
            <div class="desc">Chytaj padajúce ovocie do košíka. Pozor, zrýchľuje sa!</div>
        </a>
        <a href="/calendar/" class="game-card">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">📅</div>
            <div class="name">Ako idú za sebou dni?</div>
            <div class="desc">Zoraď dni v týždni alebo mesiace v roku na správne miesto.</div>
        </a>
    </div>

    <div class="footer">
        <p><a href="https://vinte.sk">vinte.sk</a></p>
    </div>

    <script src="static/js/sprites.js"></script>
    <script>
    // Draw characters
    const otoCtx = document.getElementById('oto-preview').getContext('2d');
    drawOto(otoCtx, 8, 8, 64);
    const lujzaCtx = document.getElementById('lujza-preview').getContext('2d');
    drawLujza(lujzaCtx, 8, 8, 64);

    // Draw apple on game card
    const appleCtx = document.getElementById('apple-preview').getContext('2d');
    drawApple(appleCtx, 10, 8, 28);
    </script>
</body>
</html>
