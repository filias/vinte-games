<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hry s Otom a Lujzou</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #e94560;
            text-shadow: 3px 3px 0 #0f3460;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 0.55rem;
            color: #888;
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.8;
            max-width: 500px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            max-width: 600px;
        }
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 2rem;
            border: 3px solid #0f3460;
            border-radius: 12px;
            background: #16213e;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.2s;
            width: 200px;
        }
        .game-card:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }
        .game-card canvas {
            margin-bottom: 0.8rem;
        }
        .game-card .name {
            font-size: 0.8rem;
            color: #e94560;
            margin-bottom: 0.4rem;
        }
        .game-card .desc {
            font-size: 0.45rem;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.4rem;
            color: #444;
            text-align: center;
            line-height: 2;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
        .footer a:hover {
            color: #e94560;
        }
    </style>
</head>
<body>
    <h1>Oto & Lujza</h1>
    <p class="subtitle">
        Jednoduché hry s Otom a Lujzou.<br>
        Niektoré sa dotýkajú tém z učebníc,<br>
        iné sú len pre zábavu.
    </p>

    <div class="games">
        <a href="/jablka/" class="game-card">
            <canvas id="apple-preview" width="48" height="48"></canvas>
            <div class="name">Chytaj Jablká</div>
            <div class="desc">Chytaj padajúce ovocie do košíka. Pozor, zrýchľuje sa!</div>
        </a>
    </div>

    <div class="footer">
        <p>&copy; Vinte</p>
    </div>

    <script>
    function drawApple(ctx, x, y, size) {
        const cx = x + size / 2;
        const cy = y + size / 2 + 2;
        const r = size * 0.38;
        ctx.fillStyle = '#e94560';
        ctx.beginPath(); ctx.arc(cx - r * 0.25, cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + r * 0.25, cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ff6b81';
        ctx.beginPath(); ctx.arc(cx - r * 0.3, cy - r * 0.3, r * 0.25, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#5C4033'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.9); ctx.lineTo(cx + 1, cy - r * 1.5); ctx.stroke();
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath(); ctx.ellipse(cx + r * 0.35, cy - r * 1.3, r * 0.4, r * 0.15, 0.4, 0, Math.PI * 2); ctx.fill();
    }
    const c = document.getElementById('apple-preview');
    drawApple(c.getContext('2d'), 10, 8, 28);
    </script>
</body>
</html>
